<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile - SeniorConnect</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">SeniorConnect</div>

    <div class="right">
        <div class="user-info">
            <div class="name" id="nav-name"></div>
            <div class="role" id="nav-role"></div>
        </div>

        <button class="btn profile" onclick="location.href='profile.html'">Profile</button>
        <button class="btn logout" onclick="logout()">Logout</button>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="profile-container">
        <div class="profile-card">

            <!-- HEADER -->
            <div class="profile-header">
                <h2 id="name">Loading...</h2>
                <p id="role">Role</p>
            </div>

            <!-- GRID -->
            <div class="profile-grid">

                <div>
                    <span class="label">Company</span>
                    <p id="company">-</p>
                </div>

                <div>
                    <span class="label">Domain</span>
                    <p id="domain">-</p>
                </div>

                <div>
                    <span class="label">Branch</span>
                    <p id="branch">-</p>
                </div>

                <div>
                    <span class="label">CGPA</span>
                    <p id="cgpa">-</p>
                </div>

                <div>
                    <span class="label">Placement Year</span>
                    <p id="year">-</p>
                </div>

            </div>

            <!-- BIO -->
            <div class="profile-bio">
                <span class="label">Bio</span>
                <p id="bio">-</p>
            </div>

            <!-- BUTTON -->
            <button class="btn primary full" onclick="location.href='create-profile.html'">
                Edit Profile
            </button>

        </div>
    </div>

</div>

<!-- SCRIPT -->
<script>

    async function loadProfile() {
        try {
            const email = localStorage.getItem("email");

            const res = await fetch(`/api/profile?email=${encodeURIComponent(email)}`);
            if (!res.ok) throw new Error("Failed to fetch");

            const data = await res.json();

            // Navbar
            document.getElementById("nav-name").innerText = data.user.name;
            document.getElementById("nav-role").innerText = data.role;
            // Profile
            document.getElementById("name").innerText = data.user.name;
            document.getElementById("role").innerText = data.role;
            document.getElementById("company").innerText = data.company;
            document.getElementById("domain").innerText = data.domain;
            document.getElementById("branch").innerText = data.branch;
            document.getElementById("cgpa").innerText = data.cgpa;
            document.getElementById("year").innerText = data.placementYear;
            document.getElementById("bio").innerText = data.bio;

        }
        catch (err) {
            console.error(err);

            // 👇 fallback from localStorage
            const name = localStorage.getItem("name");
            const role = localStorage.getItem("role");

            document.getElementById("name").innerText = name || "No Name";
            document.getElementById("role").innerText = role || "Role";

            document.getElementById("nav-name").innerText = name || "User";
            document.getElementById("nav-role").innerText = role || "";
        }
    }

    function logout() {
        window.location.href = "index.html";
    }

    loadProfile();

</script>
<script>
    const name = localStorage.getItem("name");
    const role = localStorage.getItem("role");

    document.getElementById("nav-name").innerText = name || "User";
    document.getElementById("nav-role").innerText = role || "";
</script>

</body>
</html>
