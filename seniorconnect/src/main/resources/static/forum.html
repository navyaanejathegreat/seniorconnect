<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forum - SeniorConnect</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; }
        .container { max-width: 800px; margin: 40px auto; }
        .card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 10px; }
        textarea, input { width: 100%; margin-top: 10px; padding: 10px; }
        button { margin-top: 10px; padding: 8px 16px; }
    </style>
</head>
<body>

<div class="container">

    <h2>Forum</h2>

    <!-- Ask Question -->
    <div class="card">
        <input id="title" placeholder="Title">
        <textarea id="body" placeholder="Your question"></textarea>
        <button onclick="postQuestion()">Post</button>
    </div>

    <!-- Questions -->
    <div id="questions"></div>

</div>

<script>
    const BASE = window.location.origin;
    const userId = localStorage.getItem("userId");

    async function loadQuestions() {
        const res = await fetch(`${BASE}/api/forum/questions`);
        const data = await res.json();

        const container = document.getElementById("questions");
        container.innerHTML = "";

        data.forEach(q => {
            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
            <h3>${q.title}</h3>
            <p>${q.body}</p>
            <small>By ${q.askedBy.name}</small>

            <div id="answers-${q.id}">Loading answers...</div>

            <textarea id="answer-${q.id}" placeholder="Write answer"></textarea>
            <button onclick="postAnswer(${q.id})">Answer</button>
        `;

            container.appendChild(card);
            loadAnswers(q.id);
        });
    }

    async function loadAnswers(id) {
        const res = await fetch(`${BASE}/api/answers/${id}`);
        const data = await res.json();

        const div = document.getElementById(`answers-${id}`);

        if (data.length === 0) {
            div.innerHTML = "<p>No answers yet</p>";
            return;
        }

        div.innerHTML = data.map(a => `
        <p><b>${a.user.name}:</b> ${a.content}</p>
    `).join("");
    }

    async function postQuestion() {
        const title = document.getElementById("title").value;
        const body = document.getElementById("body").value;

        if (!title || !body) {
            alert("Fill everything");
            return;
        }

        await fetch(`${BASE}/api/forum/ask`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ userId, title, body })
        });

        document.getElementById("title").value = "";
        document.getElementById("body").value = "";

        loadQuestions();
    }

    async function postAnswer(id) {
        const content = document.getElementById(`answer-${id}`).value;

        if (!content) {
            alert("Write something");
            return;
        }

        await fetch(`${BASE}/api/answers`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                questionId: id,
                userId,
                content
            })
        });

        document.getElementById(`answer-${id}`).value = "";
        loadAnswers(id);
    }

    loadQuestions();
</script>

</body>
</html>
