<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forum - SeniorConnect</title>
    <link rel="stylesheet" href="/style.css">

    <script>
        if (localStorage.getItem("mode") === "dark") {
            document.documentElement.classList.add("dark");
        }
    </script>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo" onclick="window.location.href='/dashboard.html'">
        SeniorConnect
    </div>

    <div class="right">
        <div class="user-info">
            <div class="name" id="username"></div>
            <div class="role">USER</div>
        </div>

        <button class="btn profile" onclick="window.location.href='/profile.html'">
            Profile
        </button>

        <button class="btn logout" onclick="logout()">
            Logout
        </button>

        <span class="toggle" onclick="toggleMode()">🌙</span>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="welcome">
        <h2>Forum</h2>
        <p>Ask doubts and help others</p>
    </div>

    <!-- ASK BOX -->
    <div class="ask-box">
        <input id="title" placeholder="Title">
        <textarea id="body" placeholder="Describe your question..."></textarea>
        <button class="btn primary full" onclick="postQuestion()">Post Question</button>
    </div>

    <!-- QUESTIONS -->
    <div id="questions" class="forum-list">
        <div class="empty">Loading questions...</div>
    </div>

</div>

<script>
    const BASE = window.location.origin;
    const userId = localStorage.getItem("userId");
    const name = localStorage.getItem("name");

    if (!userId) window.location.href = "/index.html";
    document.getElementById("username").innerText = name;

    /* LOAD QUESTIONS */
    async function loadQuestions() {
        const res = await fetch(`${BASE}/api/forum/questions`);
        const data = await res.json();

        const container = document.getElementById("questions");

        if (!data.length) {
            container.innerHTML = `<div class="empty">No questions yet</div>`;
            return;
        }

        container.innerHTML = "";

        data.forEach(q => {
            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
            <div class="card-title">${q.title}</div>
            <p>${q.body}</p>
            <div class="card-sub">by ${q.askedBy.name}</div>

            <div class="answers" id="answers-${q.id}">Loading answers...</div>

            <textarea id="answer-${q.id}" placeholder="Write an answer..."></textarea>
            <button class="btn full" onclick="postAnswer(${q.id})">Answer</button>
        `;

            container.appendChild(card);
            loadAnswers(q.id);
        });
    }

    /* LOAD ANSWERS */
    async function loadAnswers(id) {
        const res = await fetch(`${BASE}/api/answers/${id}`);
        const data = await res.json();

        const div = document.getElementById(`answers-${id}`);

        if (!data.length) {
            div.innerHTML = "<p class='muted'>No answers yet</p>";
            return;
        }

        div.innerHTML = data.map(a => `
        <div class="answer">
            <b>${a.user.name}:</b> ${a.content}
        </div>
    `).join("");
    }

    /* POST QUESTION */
    async function postQuestion() {
        const title = document.getElementById("title").value;
        const body = document.getElementById("body").value;

        if (!title || !body) return alert("Fill everything");

        await fetch(`${BASE}/api/forum/ask`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ userId, title, body })
        });

        document.getElementById("title").value = "";
        document.getElementById("body").value = "";

        loadQuestions();
    }

    /* POST ANSWER */
    async function postAnswer(id) {
        const content = document.getElementById(`answer-${id}`).value;

        if (!content) return alert("Write something");

        await fetch(`${BASE}/api/answers`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                questionId: id,
                userId,
                content
            })
        });

        document.getElementById(`answer-${id}`).value = "";
        loadAnswers(id);
    }



    /* LOGOUT */
    function logout(){
        localStorage.clear();
        window.location.href = "/index.html";
    }

    loadQuestions();
</script>

</body>
</html>
