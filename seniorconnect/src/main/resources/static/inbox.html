<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inbox - SeniorConnect</title>
    <link rel="stylesheet" href="/style.css">

    <script>
        if (localStorage.getItem("mode") === "dark") {
            document.documentElement.classList.add("dark");
        }
    </script>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo" onclick="window.location.href='/dashboard.html'">
        SeniorConnect
    </div>

    <div class="right">
        <div class="user-info">
            <div class="name" id="username"></div>
            <div class="role">SENIOR</div>
        </div>

        <button class="btn profile" onclick="window.location.href='/profile.html'">
            Profile
        </button>

        <button class="btn logout" onclick="logout()">
            Logout
        </button>

        <span class="toggle" onclick="toggleMode()">🌙</span>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="welcome">
        <h2>Your Inbox</h2>
        <p>Mentorship requests from juniors</p>
    </div>

    <div id="inbox-list" class="forum-list">
        <div class="empty">Loading requests...</div>
    </div>

</div>

<script>
    const BASE = window.location.origin;
    const seniorId = localStorage.getItem("userId");
    const name = localStorage.getItem("name");

    if (!seniorId) window.location.href = "/index.html";
    document.getElementById("username").innerText = name;

    /* LOAD REQUESTS */
    async function loadRequests() {
        const res = await fetch(`${BASE}/api/mentorship/received/${seniorId}`);
        const data = await res.json();

        const container = document.getElementById("inbox-list");

        if (!data.length) {
            container.innerHTML = `<div class="empty">No requests yet</div>`;
            return;
        }

        container.innerHTML = "";

        data.forEach(req => {
            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
            <div class="card-title">From: ${req.junior.name}</div>
            <div class="card-sub">${req.status}</div>

            <p>${req.message}</p>

            ${
                req.status === "PENDING"
                    ? `
                <div class="actions">
                    <button class="btn primary" onclick="respond(${req.id}, 'ACCEPTED')">
                        Accept
                    </button>
                    <button class="btn" onclick="respond(${req.id}, 'REJECTED')">
                        Reject
                    </button>
                </div>
                `
                    : ""
            }
        `;

            container.appendChild(card);
        });
    }

    /* RESPOND */
    async function respond(id, status) {
        const res = await fetch(`${BASE}/api/mentorship/respond/${id}?status=${status}`, {
            method: "PUT"
        });

        if (res.ok) {
            loadRequests();
        } else {
            alert("Something went wrong");
        }
    }



    /* LOGOUT */
    function logout(){
        localStorage.clear();
        window.location.href = "/index.html";
    }

    loadRequests();
</script>

</body>
</html>
