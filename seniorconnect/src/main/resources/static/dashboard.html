<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/style.css">

    <style>
        body {
            background: var(--bg);
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 40px;
            background: white;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            color: #2563eb; /* subtle blue */
        }

        .right {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .user-info {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-size: 13px;
        }

        .name {
            font-weight: 500;
        }

        .role {
            font-size: 11px;
            opacity: 0.6;
        }

        .btn {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }

        .btn:hover {
            border-color: #2563eb;
            color: #2563eb;
        }

        .toggle {
            cursor: pointer;
        }

        /* MAIN */
        .main {
            padding: 40px 60px;
        }

        .welcome h1 {
            margin: 0;
            font-size: 26px;
        }

        .welcome p {
            margin-top: 6px;
            color: #6b7280;
        }

        /* CARDS */
        .cards {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 22px;
        }

        .card {
            background: white;
            border-radius: 14px;
            padding: 22px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        /* BLUE ACCENT BAR */
        .card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #2563eb;
            border-radius: 14px 0 0 14px;
            opacity: 0.8;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .card h3 {
            margin: 0;
            font-size: 16px;
        }

        .card p {
            margin-top: 5px;
            font-size: 13px;
            color: #6b7280;
        }

        /* INBOX */
        .inbox {
            margin-top: 30px;
            padding: 26px;
            background: white;
            border-radius: 14px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: 0.2s;
        }

        .inbox:hover {
            border-color: #2563eb;
        }
    </style>
</head>
<script>
    if (localStorage.getItem("mode") === "dark") {
        document.documentElement.classList.add("dark");
    }
</script>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">SeniorConnect</div>

    <div class="right">
        <div class="user-info">
            <span class="name">hello</span>
            <span class="role">SENIOR</span>
        </div>

        <button class="btn profile" onclick="go('/profile.html')">Profile</button>
        <button class="btn logout" onclick="logout()">Logout</button>

        <span class="toggle" onclick="toggleTheme()">🌙</span>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="welcome">
        <h1 id="welcomeText"></h1>
        <p>What would you like to do today?</p>
    </div>

    <!-- ACTIONS -->
    <div class="cards">

        <div class="card" onclick="go('/seniors.html')">
            <h3>Find Seniors</h3>
            <p>Browse mentors</p>
        </div>

        <div class="card" onclick="go('/forum.html')">
            <h3>Ask a Question</h3>
            <p>Get help from seniors</p>
        </div>

        <div class="card" onclick="go('/mentor.html')">
            <h3>Request Mentor</h3>
            <p>1:1 mentorship</p>
        </div>


    </div>

    <!-- INBOX -->
    <div class="inbox" onclick="go('/junior-inbox.html')">
        <h3>My Inbox</h3>
        <p>View messages and requests</p>
    </div>

</div>

<script>
    function go(path){
        window.location.href = path;
    }

    // USER
    const name = localStorage.getItem("name") || "User";
    const role = localStorage.getItem("role") || "";

    document.getElementById("username").innerText = name;
    document.getElementById("role").innerText = role;
    document.getElementById("welcomeText").innerText = "Welcome back, " + name + "!";



    if (localStorage.getItem("theme") === "true") {
        document.body.classList.add("dark");
    }

    // LOGOUT
    function logout(){
        localStorage.clear();
        window.location.href = "/index.html";
    }
</script>
<script>
    function toggleTheme() {
        document.body.classList.toggle("dark");

        // save preference
        if (document.body.classList.contains("dark")) {
            localStorage.setItem("theme", "dark");
        } else {
            localStorage.setItem("theme", "light");
        }
    }

    // load saved theme
    window.onload = function () {
        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark");
        }
    };
</script>

</body>
</html>
