<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Find a Senior - SeniorConnect</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>


<!-- HEADER -->
<div class="header">
    <div class="logo" onclick="window.location.href='/dashboard.html'">
        SeniorConnect
    </div>

    <div class="right">
        <div class="user-info">
            <div class="name" id="username">User</div>
            <div class="role"id="role">User</div>
        </div>

        <button class="btn profile" onclick="window.location.href='/profile.html'">
            Profile
        </button>

        <button class="btn logout" onclick="logout()">
            Logout
        </button>


    </div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="welcome">
        <h2>Find a Senior</h2>
        <p>Browse placed seniors and connect with the right mentor.</p>
    </div>

    <!-- FILTERS -->
    <div class="filters">
        <input id="filter-company" placeholder="Company (e.g. Google)">
        <input id="filter-domain" placeholder="Domain (e.g. Backend)">
        <button class="btn primary" onclick="applyFilters()">Search</button>
        <button class="btn" onclick="clearFilters()">Clear</button>
    </div>

    <div class="count" id="result-count"></div>

    <!-- GRID -->
    <div class="grid" id="senior-grid">
        <div class="empty">Loading seniors...</div>
    </div>

</div>

<script>
    const BASE = window.location.origin;
    const name = localStorage.getItem("name");
    const  role= localStorage.getItem("role");

    if (!name) window.location.href = "/index.html";
    document.getElementById("username").innerText = name;


    /* LOAD SENIORS */
    async function loadSeniors(company="", domain="") {
        let url = `${BASE}/api?`;
        if (company) url += `company=${encodeURIComponent(company)}&`;
        if (domain) url += `domain=${encodeURIComponent(domain)}`;

        const res = await fetch(url);
        const seniors = await res.json();

        const grid = document.getElementById("senior-grid");
        const count = document.getElementById("result-count");

        if (!seniors.length) {
            grid.innerHTML = `<div class="empty">No seniors found</div>`;
            count.innerText = "";
            return;
        }

        count.innerText = `${seniors.length} senior${seniors.length>1?"s":""} found`;
        grid.innerHTML = "";

        seniors.forEach(s => {
            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
            <div class="card-title">${s.user.name}</div>
            <div class="card-sub">${s.company} · ${s.role}</div>

            <div class="tags">
                <span>${s.domain}</span>
                <span>${s.branch}</span>
                <span>${s.placementYear}</span>
            </div>

            <div class="cgpa">CGPA: ${s.cgpa}</div>

            <p class="bio">${s.bio || ""}</p>

            <button class="btn primary full"
                onclick="window.location.href='/mentor.html'">
                Request Mentorship
            </button>
        `;

            grid.appendChild(card);
        });
    }

    function applyFilters(){
        loadSeniors(
            document.getElementById("filter-company").value,
            document.getElementById("filter-domain").value
        );
    }

    function clearFilters(){
        document.getElementById("filter-company").value="";
        document.getElementById("filter-domain").value="";
        loadSeniors();
    }



    function logout(){
        localStorage.clear();
        window.location.href="/index.html";
    }

    loadSeniors();
</script>

</body>
</html>
