<!DOCTYPE html>
<html>
<head>
    <title>Create Profile</title>
    <link rel="stylesheet" href="/style.css">

    <script>
        if (localStorage.getItem("mode") === "dark") {
            document.documentElement.classList.add("dark");
        }
    </script>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo" onclick="window.location.href='/dashboard.html'">
        SeniorConnect
    </div>

    <div class="right">
        <div class="user-info">
            <div class="name" id="username"></div>
            <div class="role">SENIOR</div>
        </div>

        <button class="btn profile" onclick="window.location.href='/profile.html'">
            Profile
        </button>

        <button class="btn logout" onclick="logout()">
            Logout
        </button>

        <span class="toggle" onclick="toggleMode()">🌙</span>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="form-card">
        <h2>Create Your Profile</h2>

        <input id="company" placeholder="Company">
        <input id="roleInput" placeholder="Role (e.g. Software Engineer)">
        <input id="domain" placeholder="Domain (e.g. Backend)">
        <input id="cgpa" placeholder="CGPA">
        <input id="branch" placeholder="Branch">
        <input id="placementYear" placeholder="Placement Year">
        <textarea id="bio" placeholder="Short Bio"></textarea>

        <button class="btn primary full" onclick="createProfile()">
            Save Profile
        </button>
    </div>

</div>

<script>
    const BASE = window.location.origin;
    const name = localStorage.getItem("name");

    if (!name) window.location.href = "/index.html";
    document.getElementById("username").innerText = name;

    async function createProfile() {
        const body = {
            email: localStorage.getItem("email"),
            company: document.getElementById("company").value,
            role: document.getElementById("roleInput").value,
            domain: document.getElementById("domain").value,
            cgpa: document.getElementById("cgpa").value,
            branch: document.getElementById("branch").value,
            placementYear: document.getElementById("placementYear").value,
            bio: document.getElementById("bio").value
        };

        const res = await fetch(`${BASE}/api/profiles`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
        });

        if (res.ok) {
            window.location.href = "/dashboard.html";
        } else {
            alert("Something went wrong");
        }
    }

    
    function logout() {
        localStorage.clear();
        window.location.href = "/index.html";
    }
</script>

</body>
</html>
