<!DOCTYPE html>
<html>
<head>
    <title>Create Profile</title>
    <link rel="stylesheet" href="/style.css">
</head>
<div class="toggle" onclick="toggleMode()">🌙 Toggle</div>
<body>
<div class="header">
    <div class="logo">SeniorConnect</div>

    <div class="right">
        <div class="user-info">
            <span class="name" id="username"></span>
            <span class="role" id="role"></span>
        </div>

        <button class="logout" onclick="logout()">Logout</button>
        <div class="toggle" onclick="toggleMode()">☾</div>
    </div>
</div>

<div class="container">
    <h2>Create Your Profile</h2>

    <input id="company" placeholder="Company">
    <input id="role" placeholder="Role">
    <input id="domain" placeholder="Domain (e.g. Backend)">
    <input id="cgpa" placeholder="CGPA">
    <input id="branch" placeholder="Branch">
    <input id="placementYear" placeholder="Placement Year">
    <textarea id="bio" placeholder="Short Bio"></textarea>

    <button onclick="createProfile()">Create Profile</button>
</div>

<script>
    const BASE = window.location.origin;

    async function createProfile() {
        const body = {
            email: localStorage.getItem("email"),
            company: document.getElementById("company").value,
            role: document.getElementById("role").value,
            domain: document.getElementById("domain").value,
            cgpa: document.getElementById("cgpa").value,
            branch: document.getElementById("branch").value,
            placementYear: document.getElementById("placementYear").value,
            bio: document.getElementById("bio").value
        };

        const res = await fetch(`${BASE}/api/profiles`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
        });

        if (res.ok) {
            alert("Profile created!");
            window.location.href = "/dashboard.html";
        } else {
            alert("Something went wrong");
        }
    }
    function toggleMode() {
        document.body.classList.toggle("dark");
        localStorage.setItem("theme", document.body.classList.contains("dark"));
    }

    if (localStorage.getItem("theme") === "true") {
        document.body.classList.add("dark");
    }
</script>

</body>
</html>
