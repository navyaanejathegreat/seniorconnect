<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Request Mentor - SeniorConnect</title>
    <link rel="stylesheet" href="/style.css">

</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo" onclick="window.location.href='/dashboard.html'">
        SeniorConnect
    </div>

    <div class="right">
        <div class="user-info">
            <div class="name" id="username"></div>
            <div class="role">JUNIOR</div>
        </div>

        <button class="btn profile" onclick="window.location.href='/profile.html'">
            Profile
        </button>

        <button class="btn logout" onclick="logout()">
            Logout
        </button>

    </div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="welcome">
        <h2>Request a Mentor</h2>
        <p>Select a senior and send a mentorship request</p>
    </div>

    <!-- SENIOR LIST -->
    <div id="senior-list" class="forum-list">
        <div class="empty">Loading seniors...</div>
    </div>

    <!-- REQUEST FORM -->
    <div class="ask-box" id="request-form" style="display:none;">
        <h3 id="form-title"></h3>
        <textarea id="message" placeholder="Write your message..."></textarea>
        <button class="btn primary" onclick="sendRequest()">Send Request</button>
    </div>

    <!-- SUCCESS -->
    <div id="success-msg" class="empty" style="display:none;">
        ✅ Request sent successfully
    </div>

</div>

<script>
    const BASE = window.location.origin;
    const juniorId = localStorage.getItem("userId");
    const name = localStorage.getItem("name");

    if (!juniorId) window.location.href = "/index.html";
    document.getElementById("username").innerText = name;

    let selectedSeniorId = null;

    /* LOAD SENIORS */
    async function loadSeniors() {
        const res = await fetch(`${BASE}/api`);
        const seniors = await res.json();

        const list = document.getElementById("senior-list");

        if (!seniors.length) {
            list.innerHTML = `<div class="empty">No seniors available</div>`;
            return;
        }

        list.innerHTML = "";

        seniors.forEach(s => {
            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
            <div class="card-title">${s.user.name}</div>
            <div class="card-sub">${s.company} · ${s.domain}</div>

            <button class="btn" onclick="selectSenior(${s.user.id}, '${s.user.name}')">
                Select
            </button>
        `;

            list.appendChild(card);
        });
    }

    /* SELECT */
    function selectSenior(id, name) {
        selectedSeniorId = id;

        document.getElementById("form-title").innerText =
            "Send request to " + name;

        document.getElementById("request-form").style.display = "block";
        document.getElementById("request-form").scrollIntoView({ behavior: "smooth" });
    }

    /* SEND */
    async function sendRequest() {
        const message = document.getElementById("message").value.trim();

        if (!message) return alert("Write a message");

        const res = await fetch(`${BASE}/api/mentorship/request`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                juniorId: parseInt(juniorId),
                seniorId: selectedSeniorId,
                message
            })
        });

        if (res.ok) {
            document.getElementById("request-form").style.display = "none";
            document.getElementById("success-msg").style.display = "block";
        } else {
            alert("Something went wrong");
        }
    }



    /* LOGOUT */
    function logout(){
        localStorage.clear();
        window.location.href = "/index.html";
    }

    loadSeniors();
</script>

</body>
</html>
